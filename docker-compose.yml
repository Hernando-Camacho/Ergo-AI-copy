version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ergoai_db
    restart: always
    environment:
      POSTGRES_USER: ergoai_user
      POSTGRES_PASSWORD: ergoai_password
      POSTGRES_DB: ergoai_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ergoai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
